name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (compile + import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all modules
        working-directory: backend
        run: |
          python -m py_compile \
            app.py campaign.py db.py demo_events.py \
            mock_data.py seed.py segmenter.py templates.py

      - name: Import app (DB-less; verifies graceful fallback)
        working-directory: backend
        run: python -c "import app; print('app imported OK; db_available =', app.DB_AVAILABLE)"

      - name: Sanity-check fixtures, segmenter and templates
        working-directory: backend
        run: |
          python - <<'PY'
          from mock_data import generate_fans
          from segmenter import FanSegmenter
          from templates import FALLBACK_TEMPLATES, render

          fans = generate_fans(500)
          assert len(fans) == 500, "expected 500 fans"
          assert all(isinstance(f["total_spend_cents"], int) for f in fans), "money must be int cents"

          segs = FanSegmenter().segment_all(fans, 34.0522, -118.2437)
          assert set(segs) == {"vip", "lapsed", "first_timer", "high_spender", "local"}

          # Every pre-generated email must stay within the 120-160 word target.
          for seg, variants in FALLBACK_TEMPLATES.items():
              for v in variants:
                  body = render(v["email"], "Rolling Loud LA 2026", "2026-08-15", "Los Angeles")
                  wc = len(body.split())
                  assert 120 <= wc <= 160, f"{seg} email out of range: {wc} words"
          print("fixtures, segments and template word counts OK")
          PY

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build
        env:
          CI: false
